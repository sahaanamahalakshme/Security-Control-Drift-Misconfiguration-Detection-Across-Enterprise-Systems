services:
  # 1. Backend Web Service (FastAPI)
  - type: web
    name: sentineldna-backend
    runtime: python
    buildCommand: "pip install -r secure_baseline_updated/backend/requirements.txt"
    startCommand: "uvicorn secure_baseline_updated.backend.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false # User will set this in Render UI
      - key: HF_API_TOKEN
        sync: false # User will set this in Render UI
      - key: SLACK_WEBHOOK_URL
        sync: false # User will set this in Render UI

  # 2. Frontend Static Site (React + Vite)
  - type: web
    name: sentineldna-frontend
    runtime: static
    buildCommand: "cd secure_baseline_updated/frontend/web && npm install && npm run build"
    publishPath: "secure_baseline_updated/frontend/web/dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: sentineldna-backend
          property: host
